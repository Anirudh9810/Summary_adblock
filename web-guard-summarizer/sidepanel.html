<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGuard AI Side Panel</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <div class="icon-circle">
          <span class="shield-icon">🛡️</span>
        </div>
        <h1>WebGuard AI</h1>
      </div>
      <div style="display: flex; gap: 8px;">
        <button id="test-btn" class="icon-btn" title="Test System">🧪</button>
        <button id="settings-toggle" class="icon-btn" title="Settings">⚙️</button>
      </div>
    </header>

    <main>
      <section id="settings-panel" class="settings-panel hidden">
        <h3>Settings</h3>
        <div class="input-group">
          <label for="api-key">Gemini API Key</label>
          <input type="password" id="api-key" placeholder="Enter your API key here">
        </div>
        <div class="input-group">
          <label for="model-name">Model Name</label>
          <input type="text" id="model-name" placeholder="e.g. gemini-2.0-flash">
          <p class="hint">Check your key's supported models.</p>
        </div>
        <button id="save-settings" class="secondary-btn">Save Settings</button>
      </section>

      <section class="action-card">
        <h3>AI Summarization</h3>

        <div class="input-group">
          <label for="custom-prompt">Custom Instructions (Optional)</label>
          <textarea id="custom-prompt"
            placeholder="e.g. 'Summarize as a poem', 'Highlight key dates', 'ELI5'"></textarea>
        </div>

        <button id="summarize-btn" class="primary-btn">
          <span class="btn-text">Summarize Page</span>
          <div class="loader hidden"></div>
        </button>
      </section>

      <div id="summary-result" class="summary-container hidden">
        <div class="summary-header">
          <span>AI Insight</span>
          <button id="copy-summary" class="icon-btn" title="Copy to clipboard">📋</button>
        </div>
        <div id="summary-text" class="summary-content">
          <!-- Summary content will be injected here -->
        </div>
      </div>
    </main>

    <footer>
      <p>Powered by Gemini AI</p>
    </footer>
  </div>
  <script src="sidepanel.js"></script>
</body>

</html>
